name: Deploy to Homelab

on:
  push:
    branches: [main]

concurrency:
  group: homelab-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Update /opt/flowpress/app and restart containers
    runs-on: [self-hosted, Linux, homelab]

    steps:
      - name: Runner diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "whoami=$(whoami)"
          id
          echo "pwd=$(pwd)"
          command -v docker || true
          docker version
          docker compose version || true
          ls -la /opt || true
          ls -la /opt/flowpress || true
          ls -la /opt/flowpress/app || true
          test -r /opt/flowpress/app && echo "/opt/flowpress/app is readable" || echo "/opt/flowpress/app is NOT readable"
          test -w /opt/flowpress/app && echo "/opt/flowpress/app is writable" || echo "/opt/flowpress/app is NOT writable"

      - name: Verify docker is available
        run: docker version

      - name: Pull latest code and rebuild
        shell: bash
        run: |
          set -euo pipefail
          set -x
          cd /opt/flowpress/app

          # Avoid Git's "dubious ownership" failure when the repo owner differs.
          git config --global --add safe.directory /opt/flowpress/app

          git fetch --all --prune
          git checkout main
          git reset --hard origin/main

          docker compose up -d --build

      - name: Show running containers
        run: docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}'
